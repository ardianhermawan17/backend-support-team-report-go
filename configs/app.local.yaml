app:
  env: local

database:
  dsn: postgres://postgres:postgres@localhost:5432/soccer_team_report?sslmode=disable

auth:
  jwt_secret: local-dev-only-change-me
  access_token_ttl: 15m

security:
  max_json_body_bytes: 1048576
  rate_limit:
    login:
      window: 1m
      max_requests: 5
    authenticated_write:
      window: 1m
      max_requests: 30
